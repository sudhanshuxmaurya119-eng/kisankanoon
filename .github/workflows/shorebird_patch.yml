name: Shorebird Android Patch

on:
  push:
    branches: [ main, master ]
    paths:
      - 'kisankanoon/lib/**'
  workflow_dispatch:
    inputs:
      release_version:
        description: Shorebird release version to patch. Use latest for the newest base release.
        required: true
        default: latest
        type: string

permissions:
  contents: read

env:
  SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}

jobs:
  patch:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[release]')
    name: Publish Shorebird OTA patch
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check required secrets
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [[ -z "$SHOREBIRD_TOKEN" ]]; then
            echo "Missing required secret: SHOREBIRD_TOKEN" >&2
            exit 1
          fi

          if [[ -z "$GOOGLE_SERVICES_JSON" ]]; then
            echo "Missing required secret: GOOGLE_SERVICES_JSON" >&2
            exit 1
          fi

      - name: Detect patch-safe change set
        id: patch-safety
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "safe=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          before="${{ github.event.before }}"
          after="${{ github.sha }}"
          mapfile -t files < <(git diff --name-only "$before" "$after")

          unsafe=()
          for file in "${files[@]}"; do
            if [[ "$file" != kisankanoon/* ]]; then
              continue
            fi

            if [[ ! "$file" =~ ^kisankanoon/lib/.*\.dart$ ]]; then
              unsafe+=("$file")
            fi
          done

          if [[ "${#unsafe[@]}" -eq 0 ]]; then
            echo "safe=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "safe=false" >> "$GITHUB_OUTPUT"
          {
            echo "## Shorebird Patch Skipped"
            echo "This push changed files outside \`kisankanoon/lib/*.dart\`, so it needs a new Shorebird base release instead of an OTA patch."
            echo
            echo "Non-patchable files detected:"
            for file in "${unsafe[@]}"; do
              echo "- $file"
            done
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Java 17
        if: steps.patch-safety.outputs.safe == 'true'
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Shorebird
        if: steps.patch-safety.outputs.safe == 'true'
        uses: shorebirdtech/setup-shorebird@v1
        with:
          cache: true

      - name: Restore google-services.json
        if: steps.patch-safety.outputs.safe == 'true'
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          printf '%s' "$GOOGLE_SERVICES_JSON" > kisankanoon/android/app/google-services.json

      - name: Prepare Android signing
        if: steps.patch-safety.outputs.safe == 'true'
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [[ -n "$ANDROID_KEYSTORE_BASE64" && -n "$ANDROID_KEYSTORE_PASSWORD" && -n "$ANDROID_KEY_ALIAS" && -n "$ANDROID_KEY_PASSWORD" ]]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release-keystore.jks"
            keystore_note="Using repository Android signing secrets."
          else
            keytool -genkeypair \
              -alias upload \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storetype PKCS12 \
              -keystore "$RUNNER_TEMP/release-keystore.jks" \
              -storepass android \
              -keypass android \
              -dname "CN=Agri-Shield, OU=CI, O=Agri-Shield, L=Remote, ST=Remote, C=IN"

            ANDROID_KEYSTORE_PASSWORD="android"
            ANDROID_KEY_ALIAS="upload"
            ANDROID_KEY_PASSWORD="android"
            keystore_note="Using temporary CI signing key because Android signing secrets are not configured."
          fi

          cat <<EOF > kisankanoon/android/key.properties
          storeFile=$RUNNER_TEMP/release-keystore.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          EOF

          {
            echo "## Android Signing"
            echo "$keystore_note"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Resolve target release version
        if: steps.patch-safety.outputs.safe == 'true'
        id: patch-version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "value=${{ inputs.release_version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Shorebird Patch
        if: steps.patch-safety.outputs.safe == 'true'
        id: shorebird-patch
        uses: shorebirdtech/shorebird-patch@v1
        with:
          platform: android
          release-version: ${{ steps.patch-version.outputs.value }}
          working-directory: ./kisankanoon

      - name: Publish job summary
        if: steps.patch-safety.outputs.safe == 'true'
        run: |
          {
            echo "## Shorebird Patch"
            echo "Target release version: \`${{ steps.patch-version.outputs.value }}\`"
            echo "Patch number: \`${{ steps.shorebird-patch.outputs.patch-number }}\`"
            echo
            echo "This patch will download on the next app launch for users already running the matching Shorebird base release."
          } >> "$GITHUB_STEP_SUMMARY"
