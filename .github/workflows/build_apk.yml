name: Build KisanKanoon APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'

      - name: Restore google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > kisankanoon/android/app/google-services.json

      - name: Get Flutter packages
        run: flutter pub get
        working-directory: kisankanoon

      - name: Build APK
        run: flutter build apk --debug
        working-directory: kisankanoon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: KisanKanoon-APK
          path: kisankanoon/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: "KisanKanoon v${{ github.run_number }}"
          body: |
            ## 📲 KisanKanoon - किसान का साथी
            **Download the APK below and install on your Android phone.**

            Build: #${{ github.run_number }}
            Commit: ${{ github.event.head_commit.message }}
          files: kisankanoon/build/app/outputs/flutter-apk/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
