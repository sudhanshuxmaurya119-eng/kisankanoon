name: Build & Distribute KisanKanoon APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # Allow manual trigger

jobs:
  build-apk:
    name: Build Flutter APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Java
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      # 4. Restore google-services.json from GitHub Secret
      - name: Create google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > kisankanoon/android/app/google-services.json

      # 5. Get Flutter packages
      - name: Get Flutter packages
        run: flutter pub get
        working-directory: kisankanoon

      # 6. Build APK
      - name: Build Debug APK
        run: flutter build apk --debug
        working-directory: kisankanoon

      # 7. Upload APK as GitHub Release artifact
      - name: Upload APK to GitHub Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: KisanKanoon-debug-apk
          path: kisankanoon/build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      # 8. Distribute via Firebase App Distribution
      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          token: ${{ secrets.FIREBASE_TOKEN }}
          groups: testers
          file: kisankanoon/build/app/outputs/flutter-apk/app-debug.apk
          releaseNotes: "Auto build from commit: ${{ github.event.head_commit.message }}"
