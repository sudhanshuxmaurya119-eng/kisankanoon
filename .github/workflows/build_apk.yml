name: Build KisanKanoon APK (Shorebird)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Choose build type (Release = New APK, Patch = OTA Update)'
        required: true
        default: 'patch'
        type: choice
        options:
          - release
          - patch

permissions:
  contents: write

jobs:
  build-apk:
    name: Build & OTA with Shorebird
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'

      - name: Setup Shorebird
        uses: shorebirdtech/setup-shorebird@v1
        
      - name: Restore google-services.json
        run: |
          echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > kisankanoon/android/app/google-services.json

      - name: Get Flutter packages
        run: flutter pub get
        working-directory: kisankanoon

      - name: Run Shorebird Build
        env:
          SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.build_type }}" == "release" ]] || [[ "${{ github.event.head_commit.message }}" == *"[release]"* ]]; then
            echo "Building Shorebird Base Release (New APK)..."
            shorebird release android --force
          else
            echo "Pushing Shorebird OTA Patch..."
            shorebird patch android --force
          fi
        working-directory: kisankanoon

      - name: Upload APK artifact (Only if Release)
        if: github.event.inputs.build_type == 'release' || contains(github.event.head_commit.message, '[release]')
        uses: actions/upload-artifact@v4
        with:
          name: KisanKanoon-APK
          path: kisankanoon/build/app/outputs/flutter-apk/app-release.apk
          retention-days: 90

      - name: Create GitHub Release (Only if Release)
        if: github.event.inputs.build_type == 'release' || contains(github.event.head_commit.message, '[release]')
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: "KisanKanoon Shorebird v${{ github.run_number }}"
          body: |
            ## 📲 KisanKanoon - Shorebird Enabled
            **OTA Updates Enabled! You will never need to download this again.**
          files: kisankanoon/build/app/outputs/flutter-apk/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
