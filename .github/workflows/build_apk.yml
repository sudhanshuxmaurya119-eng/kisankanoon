name: Shorebird Android Release

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

env:
  SHOREBIRD_TOKEN: ${{ secrets.SHOREBIRD_TOKEN }}

jobs:
  release:
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[release]')
    name: Publish Shorebird base release
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check required secrets
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [[ -z "$SHOREBIRD_TOKEN" ]]; then
            echo "Missing required secret: SHOREBIRD_TOKEN" >&2
            exit 1
          fi

          if [[ -z "$GOOGLE_SERVICES_JSON" ]]; then
            echo "Missing required secret: GOOGLE_SERVICES_JSON" >&2
            exit 1
          fi

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Shorebird
        uses: shorebirdtech/setup-shorebird@v1
        with:
          cache: true

      - name: Restore google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          printf '%s' "$GOOGLE_SERVICES_JSON" > kisankanoon/android/app/google-services.json

      - name: Prepare Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [[ -n "$ANDROID_KEYSTORE_BASE64" && -n "$ANDROID_KEYSTORE_PASSWORD" && -n "$ANDROID_KEY_ALIAS" && -n "$ANDROID_KEY_PASSWORD" ]]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release-keystore.jks"
            keystore_note="Using repository Android signing secrets."
          else
            keytool -genkeypair \
              -alias upload \
              -keyalg RSA \
              -keysize 2048 \
              -validity 10000 \
              -storetype PKCS12 \
              -keystore "$RUNNER_TEMP/release-keystore.jks" \
              -storepass android \
              -keypass android \
              -dname "CN=KisanKanoon, OU=CI, O=KisanKanoon, L=Remote, ST=Remote, C=IN"

            ANDROID_KEYSTORE_PASSWORD="android"
            ANDROID_KEY_ALIAS="upload"
            ANDROID_KEY_PASSWORD="android"
            keystore_note="Using temporary CI signing key because Android signing secrets are not configured."
          fi

          cat <<EOF > kisankanoon/android/key.properties
          storeFile=$RUNNER_TEMP/release-keystore.jks
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          EOF

          {
            echo "## Android Signing"
            echo "$keystore_note"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Get Flutter packages
        run: shorebird flutter pub get
        working-directory: kisankanoon

      - name: Shorebird Release
        id: shorebird-release
        uses: shorebirdtech/shorebird-release@v1
        with:
          args: --artifact=apk
          flutter-version: 3.41.5
          platform: android
          working-directory: ./kisankanoon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: KisanKanoon-Shorebird-APK
          path: kisankanoon/build/app/outputs/apk/release/app-release.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: shorebird-android-${{ steps.shorebird-release.outputs.release-version }}
          name: KisanKanoon Shorebird ${{ steps.shorebird-release.outputs.release-version }}
          body: |
            ## KisanKanoon Shorebird base release
            Install this APK once to receive future Shorebird OTA Dart patches.

            Release Version: ${{ steps.shorebird-release.outputs.release-version }}
            Commit: ${{ github.sha }}
          files: kisankanoon/build/app/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish job summary
        run: |
          {
            echo "## Shorebird Release"
            echo "Release version: \`${{ steps.shorebird-release.outputs.release-version }}\`"
            echo "APK path: \`kisankanoon/build/app/outputs/apk/release/app-release.apk\`"
            echo
            echo "Install this Shorebird release once, then Dart-only patches can arrive over the air."
          } >> "$GITHUB_STEP_SUMMARY"
