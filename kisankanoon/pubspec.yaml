name: kisankanoon
description: "KisanKanoon - किसान का साथी | Farmer legal aid app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Firebase Backend
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  # firebase_storage removed — using local image storage instead (free)
  # Storage & State
  shared_preferences: ^2.2.2
  # Media
  image_picker: ^1.0.7
  # Network & Links
  url_launcher: ^6.2.4
  http: ^1.2.1
  # UI & Fonts
  google_fonts: ^6.1.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icon/
    - shorebird.yaml
